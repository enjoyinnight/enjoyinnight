<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Bazar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

<div class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <img class="brand-logo" data-bind="logo" alt="Site logo">
      <span class="brand-name" data-bind="siteName">Bazar</span>
    </div>
    <h1>Admin Login</h1>
    <p class="sub">Sign in to manage products and site settings.</p>

    <p class="login-error" id="loginError"></p>

    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Log In</button>
    </form>

    <p class="login-hint">Demo credentials: <strong>admin</strong> / <strong>admin123</strong><br>
    (Stored in localStorage for this demo — change them from Settings after logging in.)</p>
  </div>
</div>

<script src="js/settings.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
