<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product | Bazar Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body" data-require-auth="true">

<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="brand">
      <img class="brand-logo" data-bind="logo" alt="Site logo">
      <span class="brand-name" data-bind="siteName">Bazar</span>
    </div>
    <a class="nav-link active" href="admin-dashboard.html">📦 Products</a>
    <a class="nav-link" href="admin-settings.html">⚙️ Settings</a>
    <a class="nav-link" href="index.html" target="_blank">🌐 View site</a>
    <div class="nav-spacer"></div>
    <button class="nav-link" id="logoutBtn" style="text-align:left;border:none;background:none;width:100%;">🚪 Logout</button>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1 id="formTitle">Add New Product</h1>
      <a href="admin-dashboard.html" class="btn btn-outline">&larr; Back to list</a>
    </div>

    <div class="form-card">
      <div class="image-upload-box">
        <img id="imagePreview" style="display:none;" alt="Preview">
        <div class="field" style="text-align:left;">
          <label for="imageFile">Product image (upload from your device)</label>
          <input type="file" id="imageFile" accept="image/*">
        </div>
        <button type="button" class="btn btn-outline" id="driveUploadBtn">☁️ Upload selected file to Google Drive instead</button>
        <p class="hint" id="driveStatus">Optional — if Google Drive isn't configured yet, the locally chosen file above is used directly.</p>
      </div>

      <form id="productForm">
        <div class="form-grid">
          <div class="field"><label for="name">Product Name</label><input type="text" id="name" required></div>
          <div class="field"><label for="price">Price (₹)</label><input type="number" id="price" min="0" required></div>
          <div class="field"><label for="age">Product Age</label><input type="text" id="age" placeholder="e.g. 6 Months" required></div>
          <div class="field"><label for="city">City</label><input type="text" id="city" required></div>
          <div class="field full"><label for="address">Address</label><input type="text" id="address" required></div>
          <div class="field full"><label for="description">Description</label><textarea id="description" required></textarea></div>
          <div class="field"><label for="whatsapp">WhatsApp Number (with country code, digits only)</label><input type="text" id="whatsapp" placeholder="919999999999" required></div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save Product</button>
          <a href="admin-dashboard.html" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </main>
</div>

<script src="js/settings.js"></script>
<script src="js/drive-upload.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
